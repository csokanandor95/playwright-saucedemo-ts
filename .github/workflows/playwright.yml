name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository # Leklónozza a repo-t a CI konténerbe
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # gyorsabb újrafutás

      - name: Install dependencies
        run: npm ci # npm install helyett – CI-ban mindig ezt használjuk, mert a package-lock.json-t követi pontosan = CI/CD best practice

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps # with-deps: a böngésző futtatható állományán túl a működéséhez szükséges operációs rendszer szintű függőségeket is telepíti

      - name: Run Playwright tests
        run: npx playwright test # headlóss mód a config fájlban beállítva

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()                     # feltöltés akkor is, ha a tesztek elbuknak
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/
          retention-days: 14

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 14